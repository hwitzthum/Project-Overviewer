<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#efe4d0">
  <title>Admin — Project Overviewer</title>
  <script>
    (() => {
      const darkFamily = new Set(['dark', 'ocean', 'forest']);
      const chrome = { light: '#efe4d0', dark: '#0a1014', ocean: '#0a2230', forest: '#172117' };
      let preference = 'auto';
      try {
        const themeCookie = document.cookie
          .split(';')
          .map(part => part.trim())
          .find(part => part.startsWith('theme_preference='));
        preference = localStorage.getItem('theme')
          || (themeCookie ? decodeURIComponent(themeCookie.split('=').slice(1).join('=')) : null)
          || 'auto';
      } catch {}
      const effective = preference === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : preference;
      document.documentElement.setAttribute('data-theme', effective);
      document.documentElement.setAttribute('data-theme-preference', preference);
      document.documentElement.setAttribute('data-theme-ready', 'false');
      document.documentElement.style.colorScheme = darkFamily.has(effective) ? 'dark' : 'light';
      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      if (themeColorMeta) themeColorMeta.setAttribute('content', chrome[effective] || chrome.light);
    })();
  </script>
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body {
      display: block;
      overflow: auto;
      padding: 0;
    }

    .admin-shell {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
      min-height: 100vh;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .admin-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .admin-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      transition: background 150ms ease;
    }

    .admin-back:hover {
      background: rgba(var(--accent-rgb), 0.08);
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .admin-stat {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
    }

    .admin-stat-value {
      font-size: 32px;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
    }

    .admin-stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    .admin-section {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .admin-section-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .admin-user-row {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-light);
      gap: 16px;
    }

    .admin-user-row:last-child {
      border-bottom: none;
    }

    .admin-user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .admin-user-info {
      flex: 1;
      min-width: 0;
    }

    .admin-user-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .admin-user-email {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .admin-badge {
      display: inline-flex;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'DM Mono', monospace;
    }

    .admin-badge.admin { background: rgba(var(--accent-rgb), 0.12); color: var(--accent); }
    .admin-badge.user { background: var(--bg-tertiary); color: var(--text-secondary); }
    .admin-badge.pending { background: rgba(255, 149, 0, 0.12); color: var(--warning); }
    .admin-badge.approved { background: rgba(52, 199, 89, 0.12); color: var(--success); }

    .admin-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .admin-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }

    .admin-btn:hover {
      background: var(--bg-hover);
    }

    .admin-btn.approve {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .admin-btn.approve:hover {
      opacity: 0.9;
    }

    .admin-btn.danger {
      color: var(--danger);
      border-color: rgba(255, 59, 48, 0.3);
    }

    .admin-btn.danger:hover {
      background: rgba(255, 59, 48, 0.08);
    }

    .admin-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .admin-loading {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-tertiary);
    }

    .admin-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      padding: 12px 20px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      max-width: 360px;
      animation: toastSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-md);
    }

    .admin-toast.success {
      background: rgba(52, 199, 89, 0.12);
      border: 1px solid rgba(52, 199, 89, 0.2);
      color: var(--success);
    }

    .admin-toast.error {
      background: rgba(255, 59, 48, 0.12);
      border: 1px solid rgba(255, 59, 48, 0.2);
      color: var(--danger);
    }

    @keyframes toastSlide {
      from { opacity: 0; transform: translateX(20px); }
    }

    @media (max-width: 640px) {
      .admin-user-row {
        flex-wrap: wrap;
        gap: 10px;
      }
      .admin-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <div class="auth-bg">
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
  </div>

  <div class="admin-shell">
    <div id="adminToast" class="admin-toast" style="display:none;"></div>
    <div class="admin-header">
      <h1>Admin Panel</h1>
      <a href="/" class="admin-back">← Back to App</a>
    </div>

    <div class="admin-stats" id="adminStats">
      <div class="admin-stat">
        <div class="admin-stat-value" id="statTotal">-</div>
        <div class="admin-stat-label">Total Users</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value" id="statPending">-</div>
        <div class="admin-stat-label">Pending</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value" id="statActive">-</div>
        <div class="admin-stat-label">Active</div>
      </div>
    </div>

    <!-- Pending Users -->
    <div class="admin-section" id="pendingSection" style="display:none;">
      <div class="admin-section-header">Pending Approval</div>
      <div id="pendingList"></div>
    </div>

    <!-- All Users -->
    <div class="admin-section">
      <div class="admin-section-header">All Users</div>
      <div id="userList">
        <div class="admin-loading">Loading users...</div>
      </div>
    </div>
  </div>

  <!-- Theme Picker -->
  <div class="theme-picker">
    <button class="theme-dot active" data-theme="light" title="Light"></button>
    <button class="theme-dot" data-theme="dark" title="Dark"></button>
    <button class="theme-dot" data-theme="ocean" title="Ocean"></button>
    <button class="theme-dot" data-theme="forest" title="Forest"></button>
  </div>

  <script src="/dist/admin.bundle.js"></script>
</body>
</html>
