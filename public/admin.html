<!DOCTYPE html>
<html lang="en" data-auth-state="pending" data-page-ready="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#efe4d0">
  <title>Admin — Project Overviewer</title>
  <script src="/dist/boot.bundle.js"></script>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <div class="auth-bg">
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
  </div>

  <div class="admin-shell">
    <div id="adminToast" class="admin-toast" style="display:none;"></div>
    <div class="admin-header">
      <h1>Admin Panel</h1>
      <a href="/" class="admin-back">← Back to App</a>
    </div>

    <div class="admin-stats" id="adminStats">
      <div class="admin-stat">
        <div class="admin-stat-value" id="statTotal">-</div>
        <div class="admin-stat-label">Total Users</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value" id="statPending">-</div>
        <div class="admin-stat-label">Pending</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-value" id="statActive">-</div>
        <div class="admin-stat-label">Active</div>
      </div>
    </div>

    <!-- Pending Users -->
    <div class="admin-section" id="pendingSection" style="display:none;">
      <div class="admin-section-header">Pending Approval</div>
      <div id="pendingList"></div>
    </div>

    <!-- All Users -->
    <div class="admin-section">
      <div class="admin-section-header">All Users</div>
      <div id="userList">
        <div class="admin-loading">Loading users...</div>
      </div>
    </div>
  </div>

  <!-- Admin Modal (replaces native confirm/prompt dialogs) -->
  <div id="adminModal" class="admin-modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
    <div class="admin-modal-card">
      <div class="admin-modal-title" id="adminModalTitle"></div>
      <div class="admin-modal-message" id="adminModalMessage"></div>
      <div class="admin-modal-password-wrap" id="adminModalPasswordWrap" style="display:none;">
        <input type="password" id="adminModalPassword" placeholder="Enter your password" autocomplete="current-password">
        <div class="admin-modal-field-error" id="adminModalPasswordError" style="display:none;">Password is required</div>
      </div>
      <div class="admin-modal-actions">
        <button id="adminModalCancel" class="admin-btn">Cancel</button>
        <button id="adminModalConfirm" class="admin-btn">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Theme Picker -->
  <div class="theme-picker">
    <button class="theme-dot active" data-theme="light" title="Light"></button>
    <button class="theme-dot" data-theme="dark" title="Dark"></button>
    <button class="theme-dot" data-theme="ocean" title="Ocean"></button>
    <button class="theme-dot" data-theme="forest" title="Forest"></button>
  </div>

  <script src="/dist/admin.bundle.js"></script>
</body>
</html>
