name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "feature/**"

jobs:
  migration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # node:test migration/boot guards (database.js). These boot a real server
      # against crafted database states; no browser or frontend build required.
      - run: npm run test:migrations
