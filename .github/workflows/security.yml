name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  npm-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run audit:deps

  no-tracked-build-output:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Fail if public/dist/ is tracked
        run: |
          tracked=$(git ls-files public/dist/)
          if [ -n "$tracked" ]; then
            echo "::error::public/dist/ must not be committed — it is generated by 'npm run build'."
            echo "$tracked"
            exit 1
          fi
