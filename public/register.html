<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#efe4d0">
  <title>Create Account — Project Overviewer</title>
  <script>
    (() => {
      const darkFamily = new Set(['dark', 'ocean', 'forest']);
      const chrome = { light: '#efe4d0', dark: '#0a1014', ocean: '#0a2230', forest: '#172117' };
      let preference = 'auto';
      try {
        const themeCookie = document.cookie
          .split(';')
          .map(part => part.trim())
          .find(part => part.startsWith('theme_preference='));
        preference = localStorage.getItem('theme')
          || (themeCookie ? decodeURIComponent(themeCookie.split('=').slice(1).join('=')) : null)
          || 'auto';
      } catch {}
      const effective = preference === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : preference;
      document.documentElement.setAttribute('data-theme', effective);
      document.documentElement.setAttribute('data-theme-preference', preference);
      document.documentElement.setAttribute('data-theme-ready', 'false');
      document.documentElement.style.colorScheme = darkFamily.has(effective) ? 'dark' : 'light';
      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      if (themeColorMeta) themeColorMeta.setAttribute('content', chrome[effective] || chrome.light);
    })();
  </script>
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>

  <!-- Animated background -->
  <div class="auth-bg">
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
    <div class="auth-bg-node"></div>
  </div>

  <div class="auth-wrapper">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-brand-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <h1>Project Overviewer</h1>
      <p>Create your account</p>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <!-- Message area -->
      <div id="message" class="auth-message" role="alert">
        <span id="msg-icon-wrap"></span>
        <span id="msg-text"></span>
      </div>

      <!-- Registration form (hidden when success) -->
      <form id="registerForm" autocomplete="on">
        <div class="auth-field">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Choose a username"
              autocomplete="username"
              minlength="3"
              maxlength="50"
              required
              autofocus
            >
            <svg class="input-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="6" r="3.5"/>
              <path d="M2.5 16.5c0-3.5 2.9-5.5 6.5-5.5s6.5 2 6.5 5.5"/>
            </svg>
          </div>
        </div>

        <div class="auth-field">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="your@email.com"
              autocomplete="email"
              maxlength="255"
              required
            >
            <svg class="input-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="14" height="10" rx="2"/>
              <polyline points="2 4 9 10 16 4"/>
            </svg>
          </div>
        </div>

        <div class="auth-field">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Minimum 8 characters"
              autocomplete="new-password"
              minlength="8"
              maxlength="128"
              required
            >
            <svg class="input-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="8" width="12" height="8" rx="2"/>
              <path d="M6 8V5.5a3 3 0 0 1 6 0V8"/>
            </svg>
            <button type="button" class="toggle-password" id="togglePwd1" aria-label="Toggle password visibility" tabindex="-1">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1.5 9s3-5.5 7.5-5.5S16.5 9 16.5 9s-3 5.5-7.5 5.5S1.5 9 1.5 9z"/>
                <circle cx="9" cy="9" r="2.5"/>
              </svg>
              <svg class="eye-closed" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M2 2l14 14"/><path d="M7.6 7.6a2.5 2.5 0 0 0 3.3 3.3"/>
                <path d="M5.1 5.1C3.3 6.4 1.5 9 1.5 9s3 5.5 7.5 5.5c1.4 0 2.7-.5 3.8-1.2"/>
                <path d="M14.4 11.4c.9-1 1.6-2 2.1-2.4-1.3-2.2-4-5.5-7.5-5.5-.5 0-.9.1-1.4.2"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="pwdStrength" data-strength="0">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          <div class="password-hint" id="pwdHint"></div>
        </div>

        <div class="auth-field">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              required
            >
            <svg class="input-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="5.5 9.5 7.5 11.5 12.5 6.5"/>
              <rect x="2" y="2" width="14" height="14" rx="3"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="auth-submit" id="submitBtn">
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>
      </form>

      <!-- Pending approval state (shown after success) -->
      <div id="pendingState" style="display:none; text-align:center; padding: 16px 0;">
        <div style="width:56px;height:56px;margin:0 auto 16px;border-radius:50%;background:rgba(var(--accent-rgb),0.1);display:flex;align-items:center;justify-content:center;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h2 style="font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:8px;">Account Created</h2>
        <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;max-width:300px;margin:0 auto;">
          Your account is pending admin approval. You'll be able to sign in once an administrator approves your request.
        </p>
      </div>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <!-- Theme Picker -->
  <div class="theme-picker">
    <button class="theme-dot active" data-theme="light" title="Light"></button>
    <button class="theme-dot" data-theme="dark" title="Dark"></button>
    <button class="theme-dot" data-theme="ocean" title="Ocean"></button>
    <button class="theme-dot" data-theme="forest" title="Forest"></button>
  </div>

  <script src="/dist/register.bundle.js"></script>
</body>
</html>
